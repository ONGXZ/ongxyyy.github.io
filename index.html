<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- ============================================================
  ✏️  แก้ไขข้อมูลส่วนตัวได้ในบล็อก CONFIG ด้านล่าง (JavaScript)
============================================================ -->
<title>APP NAME</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@300;400;700&family=Yuji+Syuku&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:  #39ff7e;
  --green2: #00e5a0;
  --dark:   #050e08;
  --card:   rgba(8,20,12,0.90);
  --border: rgba(57,255,126,0.22);
  --muted:  #3a7a52;
  --text:   #c8f0d8;
  --glow:   0 0 30px rgba(57,255,126,0.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--dark);
  font-family:'Noto Sans JP',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;
}
#bg{position:fixed;inset:0;z-index:0}

/* CARD */
.wrap{position:relative;z-index:10;width:100%;max-width:390px;padding:20px 14px}
.card{
  background:var(--card);
  border:2px solid var(--border);
  box-shadow:var(--glow),inset 0 0 60px rgba(0,0,0,.45);
  position:relative;overflow:hidden;
  animation:rise .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* scanlines */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:30;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(57,255,126,.012) 3px,rgba(57,255,126,.012) 4px);
}
/* pixel corner */
.card::before{
  content:'';position:absolute;top:-2px;left:-2px;
  width:12px;height:12px;background:var(--green);z-index:31;
}

/* LOGO SECTION */
.logo-sec{
  padding:34px 28px 22px;
  display:flex;flex-direction:column;align-items:center;
  border-bottom:2px solid var(--border);position:relative;
}
.kanji{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-family:'Yuji Syuku',serif;font-size:3.8rem;
  color:rgba(57,255,126,.045);pointer-events:none;user-select:none;line-height:1;
}

/* SVG logo ring */
.logo-ring{width:108px;height:108px;cursor:pointer;margin-bottom:20px;position:relative}
.logo-ring svg{width:100%;height:100%;overflow:visible}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ring-rot{animation:spin 14s linear infinite;transform-origin:50px 50px}
@keyframes gpulse{0%,100%{opacity:.5}50%{opacity:1}}
.g-ring{animation:gpulse 2.8s ease-in-out infinite}

.app-name{
  font-family:'Zen Dots',monospace;
  font-size:1.45rem;letter-spacing:.14em;
  color:var(--green);
  text-shadow:0 0 22px rgba(57,255,126,.65),0 0 44px rgba(57,255,126,.2);
  margin-bottom:5px;text-align:center;
}
.tagline{
  font-family:'Noto Sans JP',sans-serif;
  font-size:.7rem;color:var(--muted);letter-spacing:.2em;margin-bottom:8px;
}
.handle{
  font-family:'Zen Dots',monospace;font-size:.55rem;
  color:rgba(57,255,126,.45);letter-spacing:.16em;
}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:10px;padding:13px 24px;
}
.div-l{flex:1;height:1px;background:var(--border)}
.div-t{font-family:'Zen Dots',monospace;font-size:.38rem;color:var(--muted);letter-spacing:.2em}

/* LINKS */
.links{padding:0 18px 22px;display:flex;flex-direction:column;gap:9px}
.lnk{
  display:flex;align-items:center;gap:13px;
  padding:12px 14px;
  border:1.5px solid rgba(57,255,126,.1);
  text-decoration:none;color:var(--text);
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
}
.lnk::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:rgba(57,255,126,.065);transition:width .3s ease;
}
.lnk:hover{border-color:var(--green);transform:translateX(6px)}
.lnk:hover::before{width:100%}

.ico{
  width:36px;height:36px;flex-shrink:0;
  border:1.5px solid rgba(57,255,126,.22);
  display:flex;align-items:center;justify-content:center;
  color:var(--green);
}
.ico svg{width:18px;height:18px}
.lt{flex:1}
.lp{display:block;font-family:'Zen Dots',monospace;font-size:.36rem;color:var(--muted);letter-spacing:.14em;margin-bottom:2px}
.lv{font-size:.8rem;color:var(--text)}
.la{font-family:'Zen Dots',monospace;font-size:.5rem;color:var(--muted);transition:color .2s,transform .2s}
.lnk:hover .la{color:var(--green);transform:translateX(3px)}

/* FOOTER */
.foot{
  border-top:2px solid var(--border);
  padding:9px 22px;display:flex;justify-content:space-between;align-items:center;
}
.ft{font-family:'Zen Dots',monospace;font-size:.34rem;color:var(--muted);letter-spacing:.1em}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1.1s step-end infinite}

/* PARTICLES */
.pt{position:fixed;pointer-events:none;z-index:2;border-radius:0;image-rendering:pixelated}

@media(max-width:420px){.app-name{font-size:1.15rem}.lnk{padding:10px 11px}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrap"><div class="card">

  <!-- LOGO -->
  <div class="logo-sec">
    <div class="kanji" id="kanjiDeco">自然</div>

    <div class="logo-ring" id="logoRing">
      <svg viewBox="0 0 100 100">
        <defs>
          <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- outer glow ring -->
        <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(57,255,126,.07)" stroke-width="9" class="g-ring"/>
        <!-- rotating dashed -->
        <g class="ring-rot">
          <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(57,255,126,.3)" stroke-width="1.2" stroke-dasharray="5 5"/>
        </g>
        <!-- base circle -->
        <circle cx="50" cy="50" r="37" fill="rgba(5,14,8,.92)" stroke="rgba(57,255,126,.5)" stroke-width="1.5"/>
        <!-- logo mark — edited by JS -->
        <g id="logoMark" filter="url(#gf)" stroke="#39ff7e" stroke-linecap="round" stroke-linejoin="round" fill="none"></g>
        <!-- tick marks -->
        <line x1="50" y1="7" x2="50" y2="12" stroke="#39ff7e" stroke-width="1.5"/>
        <line x1="50" y1="88" x2="50" y2="93" stroke="#39ff7e" stroke-width="1.5"/>
        <line x1="7" y1="50" x2="12" y2="50" stroke="#39ff7e" stroke-width="1.5"/>
        <line x1="88" y1="50" x2="93" y2="50" stroke="#39ff7e" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="app-name" id="elName">APP NAME</div>
    <div class="tagline" id="elTag">// tagline</div>
    <div class="handle" id="elHandle">@handle</div>
  </div>

  <div class="divider"><div class="div-l"></div><div class="div-t">CONTACT &amp; LINKS</div><div class="div-l"></div></div>

  <div class="links" id="linksEl"></div>

  <div class="foot">
    <span class="ft" id="elFoot">© 2026</span>
    <span class="ft"><span class="blink">▮</span> ONLINE</span>
  </div>

</div></div>

<script>
/* ================================================================
  ✏️  CONFIG — แก้ตรงนี้ได้เลยทั้งหมด
================================================================ */
const CONFIG = {

  /* ── ข้อมูลหลัก ── */
  appName : 'APP NAME',             // ← ชื่อแอป / ชื่อของคุณ
  tagline : 'นีออน · ธรรมชาติ · อนิเมะ',  // ← คำอธิบายสั้นๆ
  handle  : '@username',            // ← username หลักของคุณ
  footer  : '© 2026',

  /* ── โลโก้ (SVG path วาดภายในวงกลม 74×74 center=50,50) ──
     แก้ logoType เป็น 'leaf' | 'sword' | 'star' | 'wave' | 'custom'
     ถ้า custom ให้ใส่ SVG ใน logoCustomSVG */
  logoType      : 'leaf',
  logoCustomSVG : '',   // ใส่ SVG elements ที่ต้องการถ้าเลือก custom
  kanjiText     : '自然',  // ← คันจิประดับ (เปลี่ยนได้)

  /* ── ช่องทางติดต่อ — เพิ่ม/ลบ object ได้เลย ──
     icon: 'instagram' | 'facebook' | 'github' | 'discord' | 'youtube'
           | 'twitter' | 'tiktok' | 'line' | 'email' | 'website'        */
  links: [
    {
      platform : 'INSTAGRAM',
      value    : '@your_instagram',
      url      : 'https://instagram.com/your_instagram',
      icon     : 'instagram',
    },
    {
      platform : 'FACEBOOK',
      value    : 'Your Name',
      url      : 'https://facebook.com/yourprofile',
      icon     : 'facebook',
    },
    {
      platform : 'GITHUB',
      value    : 'yourusername',
      url      : 'https://github.com/yourusername',
      icon     : 'github',
    },
    {
      platform : 'DISCORD',
      value    : 'username',
      url      : 'https://discord.com/users/yourID',
      icon     : 'discord',
    },
    {
      platform : 'YOUTUBE',
      value    : '@yourchannel',
      url      : 'https://youtube.com/@yourchannel',
      icon     : 'youtube',
    },
  ],

  /* ── สีธีม ── */
  colors: {
    accent  : '#39ff7e',   // สีหลัก (neon green)
    dark    : '#050e08',
    skyTop  : '#030c06',
    skyBot  : '#061610',
    mtn1    : '#04100a',
    mtn2    : '#081a0e',
    mtn3    : '#0d2914',
    moon    : '#daf0e4',
    water   : '#030d07',
  },
};
/* ================================================================ */


/* ── ICONS ── */
const IC = {
  instagram:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>`,
  facebook :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`,
  github   :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`,
  discord  :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127c-.598.35-1.22.645-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`,
  youtube  :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>`,
  twitter  :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 4l16 16M4 20L20 4"/><path d="M20 4h-5m5 0v5M4 4h5M4 20h5m-5 0v-5"/></svg>`,
  tiktok   :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>`,
  line     :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2C6.48 2 2 6.02 2 11c0 3.65 2.3 6.82 5.73 8.61L7 22l3.12-1.56C10.73 20.81 11.36 21 12 21c5.52 0 10-4.02 10-9S17.52 2 12 2z"/><path d="M8 11h.01M12 11h.01M16 11h.01" stroke-width="2.5"/></svg>`,
  email    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`,
  website  :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 1 0 20M12 2a14.5 14.5 0 0 0 0 20M2 12h20"/></svg>`,
};

/* ── LOGO MARKS ── */
const LOGOS = {
  leaf:`
    <line x1="50" y1="64" x2="50" y2="36" stroke-width="2"/>
    <path d="M50 53 Q37 44 39 31 Q50 40 50 53" fill="rgba(57,255,126,.22)" stroke-width="1.5"/>
    <path d="M50 46 Q63 37 61 24 Q50 33 50 46" fill="rgba(57,255,126,.22)" stroke-width="1.5"/>
    <path d="M50 64 Q43 70 41 75" stroke-width="1.5"/>
    <path d="M50 64 Q57 70 59 75" stroke-width="1.5"/>`,
  sword:`
    <line x1="50" y1="22" x2="50" y2="68" stroke-width="2.5"/>
    <line x1="42" y1="58" x2="58" y2="58" stroke-width="2"/>
    <path d="M46 22 L54 22 L50 14 Z" fill="rgba(57,255,126,.3)" stroke-width="1.5"/>
    <circle cx="50" cy="72" r="3" fill="none" stroke-width="1.5"/>`,
  star:`
    <polygon points="50,24 54,38 68,38 57,47 61,62 50,53 39,62 43,47 32,38 46,38" fill="rgba(57,255,126,.2)" stroke-width="1.5"/>`,
  wave:`
    <path d="M28 44 Q36 36 44 44 Q52 52 60 44 Q68 36 72 44" stroke-width="2" fill="none"/>
    <path d="M28 54 Q36 46 44 54 Q52 62 60 54 Q68 46 72 54" stroke-width="2" fill="none"/>
    <line x1="50" y1="30" x2="50" y2="38" stroke-width="2"/>
    <circle cx="50" cy="27" r="3" fill="none" stroke-width="1.5"/>`,
};

/* ── APPLY ── */
const C = CONFIG.colors;
document.documentElement.style.setProperty('--green', C.accent);
document.title = CONFIG.appName;

document.getElementById('elName').textContent   = CONFIG.appName;
document.getElementById('elTag').textContent    = '// ' + CONFIG.tagline;
document.getElementById('elHandle').textContent = CONFIG.handle;
document.getElementById('elFoot').textContent   = CONFIG.footer;
document.getElementById('kanjiDeco').textContent = CONFIG.kanjiText;

// Logo mark
const lm = document.getElementById('logoMark');
lm.innerHTML = CONFIG.logoType === 'custom'
  ? CONFIG.logoCustomSVG
  : (LOGOS[CONFIG.logoType] || LOGOS.leaf);

// Links
const le = document.getElementById('linksEl');
CONFIG.links.forEach(l => {
  const a = document.createElement('a');
  a.className = 'lnk';
  a.href = l.url || '#';
  if(l.url) a.target = '_blank';
  a.rel = 'noopener';
  a.innerHTML = `
    <div class="ico">${IC[l.icon]||IC.website}</div>
    <div class="lt">
      <span class="lp">${l.platform}</span>
      <span class="lv">${l.value}</span>
    </div>
    <span class="la">→</span>`;
  le.appendChild(a);
});

/* ── BACKGROUND CANVAS ── */
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
const PX = 4;
function rng(n,max){return((Math.sin(n*9301+49297)*233280)%1+1)%1*max}

function drawBG(){
  const W=cv.width=innerWidth, H=cv.height=innerHeight;

  // Sky
  const sg=cx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,C.skyTop); sg.addColorStop(1,C.skyBot);
  cx.fillStyle=sg; cx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<100;i++){
    const sx=rng(i*3,W), sy=rng(i*7,H*.52);
    cx.fillStyle=`rgba(255,255,255,${.25+rng(i,.55)})`;
    cx.fillRect(Math.floor(sx/PX)*PX,Math.floor(sy/PX)*PX,i%9===0?PX*2:PX,i%9===0?PX*2:PX);
  }

  // Moon
  const mx=W*.76,my=H*.13,mr=30;
  const mg=cx.createRadialGradient(mx,my,0,mx,my,mr*4.5);
  mg.addColorStop(0,'rgba(180,255,210,.1)');mg.addColorStop(1,'transparent');
  cx.fillStyle=mg;cx.fillRect(mx-mr*5,my-mr*5,mr*10,mr*10);
  for(let py=-mr;py<=mr;py+=PX)
    for(let px=-mr;px<=mr;px+=PX)
      if(px*px+py*py<=mr*mr){cx.fillStyle=C.moon;cx.fillRect(mx+px,my+py,PX,PX)}

  // Mountains
  [[.57,.73,C.mtn1],[.44,.63,C.mtn2],[.36,.53,C.mtn3]].forEach(([hf,bf,col])=>{
    cx.fillStyle=col;
    const pY=H*hf,bY=H*bf,pX=W*.5;
    for(let py=pY;py<bY;py+=PX){
      const hw=((py-pY)/(bY-pY))*W*.62;
      cx.fillRect(Math.floor((pX-hw)/PX)*PX,Math.floor(py/PX)*PX,Math.ceil(hw*2/PX)*PX,PX);
    }
  });

  // Neon treeline glow
  const ng=cx.createLinearGradient(0,H*.49,0,H*.63);
  ng.addColorStop(0,`rgba(57,255,126,.05)`);ng.addColorStop(1,'transparent');
  cx.fillStyle=ng;cx.fillRect(0,H*.49,W,H*.14);

  // Trees
  const tc=Math.floor(W/42);
  for(let t=0;t<tc;t++){
    const tx=(t/(tc-1))*W,ty=H*(.5+rng(t*11,1)*.05);
    const th=48+rng(t*7,28),col=t%2===0?C.mtn1:C.mtn2;
    cx.fillStyle=col;
    const ly=Math.floor(th/(PX*2));
    for(let l=0;l<ly;l++){
      const tw=(1-l/ly*.6)*PX*4.5;
      cx.fillRect(Math.floor((tx-tw)/PX)*PX,Math.floor((ty-l*PX*2)/PX)*PX,Math.ceil(tw*2/PX)*PX,PX*2);
    }
    cx.fillRect(Math.floor((tx-PX)/PX)*PX,Math.floor(ty/PX)*PX,PX*2,PX*3);
  }

  // Water
  const wY=H*.7;
  const wg=cx.createLinearGradient(0,wY,0,H);
  wg.addColorStop(0,C.water);wg.addColorStop(1,'#020904');
  cx.fillStyle=wg;cx.fillRect(0,wY,W,H-wY);

  // shimmer
  cx.fillStyle='rgba(57,255,126,.022)';
  for(let wy=wY;wy<H;wy+=PX*4)
    for(let wx=0;wx<W;wx+=PX*8)
      if(rng(wx+wy,1)>.5)cx.fillRect(wx,wy,PX*4,PX);

  // moon reflection
  const rg=cx.createLinearGradient(0,wY,0,H);
  rg.addColorStop(0,'rgba(180,255,210,.06)');rg.addColorStop(1,'transparent');
  cx.fillStyle=rg;cx.fillRect(mx-26,wY,52,H-wY);
}

window.addEventListener('resize',drawBG);
drawBG();

/* ── PARTICLES ── */
(function(){
  const s=document.createElement('style');
  s.textContent=`
    @keyframes pf0{0%{opacity:0;transform:translate(0,0)}30%{opacity:.9}100%{opacity:0;transform:translate(-40px,-70px)}}
    @keyframes pf1{0%{opacity:0;transform:translate(0,0)}30%{opacity:.8}100%{opacity:0;transform:translate(50px,-55px)}}
    @keyframes pf2{0%{opacity:0;transform:translate(0,0)}40%{opacity:.7}100%{opacity:0;transform:translate(-20px,-80px)}}`;
  document.head.appendChild(s);
  const acc=C.accent;
  const sakura='rgba(255,182,214,.75)';
  for(let i=0;i<24;i++){
    const el=document.createElement('div');
    el.className='pt';
    const sz=i%5===0?6:3;
    el.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}vw;top:${12+Math.random()*65}vh;
      background:${i%3===0?sakura:acc};
      box-shadow:0 0 ${sz*2}px ${acc};
      animation:pf${i%3} ${6+Math.random()*9}s ease-in-out ${-Math.random()*9}s infinite;`;
    document.body.appendChild(el);
  }
})();

/* ── LOGO CLICK PULSE ── */
document.getElementById('logoRing').addEventListener('click',()=>{
  const m=document.getElementById('logoMark');
  m.style.transition='filter .08s';
  m.style.filter='drop-shadow(0 0 18px #39ff7e)';
  setTimeout(()=>m.style.filter='',700);
});
</script>
</body>
